name: CareFusion (BD)
description: >-
  CareFusion is a medical technology brand, acquired by BD (Becton,
  Dickinson and Company) in 2015, best known for the Alaris infusion
  system and the Pyxis automated dispensing product line. CareFusion
  does not expose a public developer API; instead, its devices and
  dispensing systems interoperate with hospital EMRs and pharmacy
  systems over HL7 v2 messaging, smart-pump interoperability
  middleware, and vendor-managed integration services. The Alaris
  Infusion Interoperability program wirelessly transmits orders from
  EMRs (such as Epic and Cerner) into Alaris large-volume and syringe
  modules and returns infusion status back to the EMR in near real
  time, using the Alaris Guardrails drug library as a safety layer.
